version: 2
builds:
  - main: ./cmd/genie
    binary: genie
    ldflags:
      - -s -w -X main.Version={{.Version}}
    goos:
      - linux
      - darwin
    goarch:
      - amd64
      - arm64

archives:
  - format: tar.gz
    name_template: "genie_{{ .Os }}_{{ .Arch }}"

brews:
  - name: genie
    repository:
      owner: saadjs
      name: homebrew-tap
    directory: Formula
    homepage: "https://github.com/saadjs/genie-cli"
    description: "Translate plain English into shell commands"
    license: "MIT"
    test: |
      assert_match "genie", shell_output("#{bin}/genie --version")

release:
  github:
    owner: saadjs
    name: genie-cli
